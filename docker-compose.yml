services:
  imaprest:
    build: ./rest
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    restart: unless-stopped

  imaprest-mcp:
    build: ./mcp
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      IMAPREST_URL: "http://imaprest:3000"
      MAIL_USER: "${MAIL_USER}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_IMAP_HOST: "${MAIL_IMAP_HOST}"
      MAIL_IMAP_PORT: "${MAIL_IMAP_PORT:-993}"
      MAIL_IMAP_TLS: "${MAIL_IMAP_TLS:-true}"
      MAIL_SMTP_HOST: "${MAIL_SMTP_HOST}"
      MAIL_SMTP_PORT: "${MAIL_SMTP_PORT:-587}"
      MAIL_SMTP_TLS: "${MAIL_SMTP_TLS:-false}"
    depends_on:
      - imaprest
    restart: unless-stopped
